<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Football Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: #0b1220;
    color: white;
}

/* ===== HEADER ===== */
.header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
}

/* ===== LAYOUT ===== */
.container {
    display: grid;
    grid-template-columns: 250px 1fr;
}

/* ===== SIDEBAR ===== */
.sidebar {
    background: #111827;
    padding: 20px;
    height: 100vh;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    background: #1f2937;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 8px;
}

.sidebar button:hover {
    background: #374151;
}

/* ===== MAIN ===== */
.main {
    padding: 20px;
}

/* ===== SECTION ===== */
.section {
    margin-bottom: 40px;
}

.section-title {
    font-size: 22px;
    margin-bottom: 20px;
}

/* ===== GRID ===== */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
}

.card {
    background: #111827;
    padding: 15px;
    border-radius: 12px;
}

canvas {
    width: 100% !important;
    height: 300px !important;
}
</style>
</head>

<body>

<div class="header">⚽ Football Analytics Dashboard</div>

<div class="container">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h3>Models</h3>
    <button onclick="loadModel('model1')">Main Model</button>
    <button onclick="loadModel('model2')">Model B</button>
    <button onclick="compareModels()">Compare Models</button>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

<!-- ===== SECTION 1 ===== -->
<div class="section">
    <div class="section-title">📊 Score Prediction Analysis</div>

    <div class="grid">
        <div class="card"><canvas id="barChart"></canvas></div>
        <div class="card"><canvas id="lineChart"></canvas></div>
    </div>
</div>

<!-- ===== SECTION 2 ===== -->
<div class="section">
    <div class="section-title">📈 Distribution Analysis</div>

    <div class="grid">
        <div class="card"><canvas id="distChart"></canvas></div>
        <div class="card"><canvas id="scatterChart"></canvas></div>
    </div>
</div>

<!-- ===== SECTION 3 ===== -->
<div class="section">
    <div class="section-title">🎯 Outcome Analysis</div>

    <div class="grid">
        <div class="card"><canvas id="outcomeBar"></canvas></div>
        <div class="card"><canvas id="confusionChart"></canvas></div>
    </div>
</div>

<!-- ===== SECTION 4 ===== -->
<div class="section">
    <div class="section-title">🏆 Accuracy</div>

    <div class="grid">
        <div class="card"><canvas id="donut1"></canvas></div>
        <div class="card"><canvas id="donut2"></canvas></div>
    </div>
</div>

</div>
</div>

<script>

// ================= SAMPLE DATA =================
const labels = Array.from({length: 38}, (_, i) => i + 1);

let modelData = {
    model1: {
        pred: labels.map(() => Math.floor(Math.random()*3)+1),
        actual: labels.map(() => Math.floor(Math.random()*4)+1)
    },
    model2: {
        pred: labels.map(() => Math.floor(Math.random()*3)+1),
        actual: labels.map(() => Math.floor(Math.random()*4)+1)
    }
};

let currentModel = "model1";

// ================= LOAD MODEL =================
function loadModel(model) {
    currentModel = model;
    renderCharts();
}

// ================= COMPARE =================
function compareModels() {
    alert("Comparison mode coming (you can extend with dual charts)");
}

// ================= CHARTS =================
let charts = [];

function destroyCharts() {
    charts.forEach(c => c.destroy());
    charts = [];
}

function renderCharts() {
    destroyCharts();

    let data = modelData[currentModel];

    // ===== BAR =====
    charts.push(new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [
                {label: "Predicted", data: data.pred, backgroundColor: "red"},
                {label: "Actual", data: data.actual, backgroundColor: "blue"}
            ]
        },
        options: darkOptions()
    }));

    // ===== LINE =====
    charts.push(new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {label: "Predicted", data: data.pred, borderColor: "red"},
                {label: "Actual", data: data.actual, borderColor: "cyan"}
            ]
        },
        options: darkOptions()
    }));

    // ===== DIST =====
    charts.push(new Chart(document.getElementById("distChart"), {
        type: "bar",
        data: {
            labels: ["1","2","3","4"],
            datasets: [{
                label: "Frequency",
                data: [5,10,15,8],
                backgroundColor: "teal"
            }]
        },
        options: darkOptions()
    }));

    // ===== SCATTER =====
    charts.push(new Chart(document.getElementById("scatterChart"), {
        type: "scatter",
        data: {
            datasets: [{
                label: "Scatter",
                data: labels.map((x,i)=>({x:x,y:data.actual[i]})),
                backgroundColor: "yellow"
            }]
        },
        options: darkOptions()
    }));

    // ===== OUTCOME =====
    charts.push(new Chart(document.getElementById("outcomeBar"), {
        type: "bar",
        data: {
            labels: ["Win","Draw","Loss"],
            datasets: [{
                label: "Matches",
                data: [20,10,8],
                backgroundColor: ["green","orange","red"]
            }]
        },
        options: darkOptions()
    }));

    // ===== CONFUSION =====
    charts.push(new Chart(document.getElementById("confusionChart"), {
        type: "bar",
        data: {
            labels: ["Correct","Wrong"],
            datasets: [{
                data: [22,16],
                backgroundColor: ["green","red"]
            }]
        },
        options: darkOptions()
    }));

    // ===== DONUT =====
    charts.push(new Chart(document.getElementById("donut1"), {
        type: "doughnut",
        data: {
            labels: ["Correct","Wrong"],
            datasets: [{
                data: [22,16],
                backgroundColor: ["teal","red"]
            }]
        }
    }));

    charts.push(new Chart(document.getElementById("donut2"), {
        type: "doughnut",
        data: {
            labels: ["Exact","Partial"],
            datasets: [{
                data: [9,13],
                backgroundColor: ["green","yellow"]
            }]
        }
    }));
}

// ================= DARK OPTIONS =================
function darkOptions() {
    return {
        plugins: {
            legend: {labels: {color: "white"}}
        },
        scales: {
            x: {ticks: {color: "white"}},
            y: {ticks: {color: "white"}}
        }
    };
}

// INIT
renderCharts();

</script>

</body>
</html>
